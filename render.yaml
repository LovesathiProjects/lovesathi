services:
  - type: web
    name: lovesathi-web
    runtime: node
    rootDir: .
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /
    envVars:
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: NEXT_PUBLIC_SITE_URL
        value: https://lovesathi.com
      - key: ADMIN_EMAILS
        sync: false
      - key: SUBSCRIPTION_MAINTENANCE_SECRET
        sync: false

  - type: cron
    name: lovesathi-subscription-maintenance
    runtime: node
    rootDir: .
    schedule: "0 */6 * * *"
    buildCommand: npm install
    startCommand: node scripts/run-subscription-maintenance.mjs
    envVars:
      - key: NEXT_PUBLIC_SITE_URL
        value: https://lovesathi.com
      - key: SUBSCRIPTION_MAINTENANCE_SECRET
        sync: false
